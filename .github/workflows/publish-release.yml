name: Publish Release

# Skeleton release workflow for repos with no build artefacts (framework repos,
# documentation repos, etc.).
#
# Triggered by a tag push. This workflow:
#   1. Updates version: in .ai/config.yml on main to the released tag
#   2. Creates the GitHub release (stub) — which triggers the Release Notes
#      workflow (release.yml) to generate and update the AI release notes
#
# For repos that produce build artefacts (Go binaries, npm packages, etc.),
# replace this workflow with your build tool's own release workflow
# (GoReleaser, semantic-release, etc.). See .ai/docs/examples/ for patterns.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    # NOTE: Do NOT add 'permissions: contents: write' here and do NOT use github.token
    # for the release creation step. GitHub does not trigger downstream workflows
    # (e.g. release.yml) for events created by GITHUB_TOKEN — only PAT-created events
    # propagate. GOOSE_AGENT_PAT must be used for the release create API call.
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Update version in .ai/config.yml
        id: version
        run: |
          sed -i "s/^version:.*/version: ${{ github.ref_name }}/" .ai/config.yml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ai/config.yml
          if git diff --cached --quiet; then
            echo "version already up to date — skipping commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update version to ${{ github.ref_name }}"
            git push origin main
            # Move the tag to include the version bump commit
            git tag -f ${{ github.ref_name }}
            git push origin -f refs/tags/${{ github.ref_name }}
            echo "Tag ${{ github.ref_name }} moved to version-bump commit"
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub release
        # Skip if this run was triggered by the tag force-push from the version bump step
        if: steps.version.outputs.committed != 'true'
        env:
          GOOSE_AGENT_PAT: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          # Check if release already exists — skip gracefully if so (avoids duplicate on re-tag)
          STATUS=$(curl --proto '=https' --tlsv1.2 -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${GOOSE_AGENT_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
          if [ "${STATUS}" = "200" ]; then
            echo "Release ${{ github.ref_name }} already exists — skipping"
            exit 0
          fi
          curl --proto '=https' --tlsv1.2 -sf -X POST \
            -H "Authorization: token ${GOOSE_AGENT_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"Release ${{ github.ref_name }}\", \"body\": \"Generating release notes\u2026\"}"
