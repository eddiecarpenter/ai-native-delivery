name: Update bootstrap.sh checksum

on:
  push:
    branches:
      - main
    paths:
      - bootstrap.sh

jobs:
  checksum:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate MD5 checksum
        run: md5sum bootstrap.sh > bootstrap.sh.md5

      - name: Commit updated checksum
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bootstrap.sh.md5
          git diff --staged --quiet || git commit -m "chore: update bootstrap.sh.md5 [skip ci]"
          git push
