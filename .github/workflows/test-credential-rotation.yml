name: POC — Credential Rotation Test

on:
  workflow_dispatch:

jobs:
  test-rotation:
    name: Test Claude Code credential rotation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude Code auth
        run: |
          mkdir -p ~/.claude
          echo "${{ secrets.CLAUDE_CREDENTIALS_JSON }}" | base64 -d > ~/.claude/.credentials.json
          chmod 0600 ~/.claude/.credentials.json

      - name: Validate and update secret
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          if [ ! -s ~/.claude/.credentials.json ]; then
            echo "ERROR: credentials file is empty or missing"
            exit 1
          fi
          claude -p "hi" > /dev/null || {
            echo "ERROR: claude -p 'hi' failed — session may be revoked"
            exit 1
          }
          echo "Claude Code credentials valid — updating secret"
          gh secret set CLAUDE_CREDENTIALS_JSON \
            --repo "${GITHUB_REPOSITORY}" \
            --body "$(cat ~/.claude/.credentials.json | base64 | tr -d '\n')" \
            && echo "✓ Secret updated successfully" \
            || { echo "✗ Secret update failed"; exit 1; }
