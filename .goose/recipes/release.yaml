version: "1.0.0"
title: "Release"
description: "Generates AI release notes from git history since the previous tag and creates the GitHub release."

parameters:
  - key: tag
    input_type: string
    requirement: required
    description: "The release tag that was just pushed (e.g. v0.8.0)"

  - key: repo
    input_type: string
    requirement: required
    description: "Repository in owner/name format (e.g. eddiecarpenter/ai-native-delivery)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 120
    bundled: true

settings:
  max_turns: 20

instructions: |
  You are running a Release session for tag {{ tag }} in {{ repo }}.

  Read and follow base/skills/release-notes.md exactly.
  Use {{ tag }} and {{ repo }} wherever the skill references those values.

  Do not push commits. Do not modify source files.

prompt: |
  Release session starting for {{ tag }} in {{ repo }}.
  Reading commit history, generating release notes, creating GitHub release.
